    <script>
        function muestra_seccion(seccion) {
            var els = document.getElementsByClassName(seccion);
            var flecha = document.getElementById('flecha-' + seccion);
            var visible = els.length > 0 && els[0].style.display !== 'none';
            for (var i = 0; i < els.length; i++) {
                els[i].style.display = visible ? 'none' : '';
            }
            if (flecha) {
                flecha.src = visible ? 'images/flecha_abajo.png' : 'images/flecha_arriba.png';
            }
        }
