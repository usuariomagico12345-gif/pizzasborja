<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Impresión</title>
</head>
<body>
  <h1>Detalle de impresión</h1>
  <p id="salida">Cargando...</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const modelo = params.get("modelo");
    const noModelo = params.get("no_modelo");

    document.getElementById("salida").textContent =
      `Modelo: ${modelo} | No. Modelo: ${noModelo}`;

    // Aquí puedes agregar la lógica real:
    // por ejemplo, usar "modelo" y "noModelo" para pedir datos a una API,
    // mostrar una imagen específica, un formulario, etc.
  </script>
</body>
</html>
